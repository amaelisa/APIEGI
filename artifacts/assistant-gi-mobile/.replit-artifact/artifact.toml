kind = "mobile"
previewPath = "/mobile/"
title = "Assistant GI Mobile"
version = "1.0.0"
id = "artifacts/assistant-gi-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 19806

[services.development]
run = "pnpm --filter @workspace/assistant-gi-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/assistant-gi-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/assistant-gi-mobile", "run", "serve" ]

[services.env]
PORT = "19806"
BASE_PATH = "/mobile/"
