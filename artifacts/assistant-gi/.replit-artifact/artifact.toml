kind = "web"
previewPath = "/"
title = "Assistant Pédagogique GI"
version = "1.0.0"
id = "artifacts/assistant-gi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21732

[services.development]
run = "pnpm --filter @workspace/assistant-gi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/assistant-gi", "run", "build" ]
publicDir = "artifacts/assistant-gi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21732"
BASE_PATH = "/"
