name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_PUBLIC_API_URL: https://assistant-gi-backendd.onrender.com

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Generate native Android project
        working-directory: mobile
        run: ./node_modules/.bin/expo prebuild --platform android --no-install

      - name: Build Standalone Release APK
        working-directory: mobile/android
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AssistantGI-Android
          path: mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
